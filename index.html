<!DOCTYPE html>
<html>
<head>
<title>DNS Checker Tool</title>
<style>
body{
  font-family: Arial;
  margin:40px;
}

.pass{
  color:green;
  font-weight:bold;
}

.fail{
  color:red;
  font-weight:bold;
}

.box{
  border:1px solid #ccc;
  padding:15px;
  margin-top:15px;
  border-radius:6px;
}

.copy{
  cursor:pointer;
  padding:5px 10px;
  margin-top:5px;
  background:#0073e6;
  color:#fff;
  border:none;
  border-radius:4px;
}

.instructions{
  border:1px solid #0073e6;
  background:#f0f8ff;
  padding:15px;
  margin-top:30px;
  border-radius:6px;
}

.instructions h3{
  margin-top:0;
}

pre{
  background:#eee;
  padding:10px;
  border-radius:4px;
  white-space: pre-wrap;
}
</style>
</head>

<body>
<h2>DNS Checker Tool</h2>

<input id="domain" placeholder="Enter domain">
<button onclick="checkDNS()">Check DNS</button>

<!-- Team Signature -->
<div style="margin-top:40px; font-size:14px; color:#555; text-align:center;">
  Powered by MyCRM Technology Support
</div>
  
<div id="results"></div>

<!-- Copyable instructions -->
<div id="instructions-copyable" class="instructions" style="display:none;">
  <h3>DNS Records Instructions (Copy & Apply)</h3>
  <pre id="copyableInstructions"></pre>
  <button class="copy" onclick="copyInstructions()">Copy All Instructions</button>
</div>

<!-- Non-copyable instructions -->
<div id="instructions-noncopyable" class="instructions" style="display:none;">
  <h3>Instructions (Requires MyCRM Technology Support)</h3>
  <pre id="nonCopyableInstructions"></pre>
</div>

<script>
async function checkDNS(){
  const domain = document.getElementById("domain").value.trim()
  if(!domain) return alert("Please enter a domain")

  const res = await fetch("https://dns.google/resolve?name=" + domain + "&type=TXT")
  const data = await res.json()
  let txtRecords = []
  if(data.Answer){
    data.Answer.forEach(r=>{
      txtRecords.push(r.data.replace(/"/g,""))
    })
  }

  let resultsHTML = ""
  const copyable = []
  const nonCopyable = []

  // --- SPF ---
  let spfPass = txtRecords.some(r=>r.includes("spf1"))
  if(spfPass){
    resultsHTML += `<div class="box">SPF: <span class="pass">PASS</span></div>`
  } else {
    resultsHTML += `<div class="box">SPF: <span class="fail">FAIL</span></div>`
    copyable.push(`SPF TXT Record:
Please include the following to your current SPF record:

include:sendgrid.net include:spf.mandrillapp.com
NOTE: Please add to your existing SPF record (!DO NOT create a new SPF!)

Or if you don’t have a current SPF record, create one with:

v=spf1 include:sendgrid.net include:spf.mandrillapp.com ~all`)
  }

  // --- Mandrill ---
  let mandrillPass = txtRecords.some(r=>r.includes("mandrill_"))
  if(mandrillPass){
    resultsHTML += `<div class="box">Mandrill Verify: <span class="pass">PASS</span></div>`
  } else {
    resultsHTML += `<div class="box">Mandrill Verify: <span class="fail">FAIL</span></div>`
    nonCopyable.push(`Mandrill Verification:
No Mandrill TXT record found.
Generate from Mailchimp Mandrill or contact MyCRM Technology Support.`)
  }

  // --- DMARC ---
  let dmarcPass = txtRecords.some(r=>r.includes("DMARC1"))
  if(dmarcPass){
    resultsHTML += `<div class="box">DMARC: <span class="pass">PASS</span></div>`
  } else {
    resultsHTML += `<div class="box">DMARC: <span class="fail">FAIL</span></div>`
    copyable.push(`DMARC TXT Record:
Create the following TXT record:

v=DMARC1; p=none;`)
  }

  // --- DKIM ---
  let dkim1 = txtRecords.some(r=>r.includes("mte1._domainkey"))
  let dkim2 = txtRecords.some(r=>r.includes("mte2._domainkey"))
  if(dkim1 && dkim2){
    resultsHTML += `<div class="box">DKIM: <span class="pass">PASS</span></div>`
  } else {
    resultsHTML += `<div class="box">DKIM: <span class="fail">FAIL</span></div>`
    copyable.push(`DKIM CNAME Records:
CNAME1: mte1._domainkey.${domain} -> dkim1.mandrillapp.com
CNAME2: mte2._domainkey.${domain} -> dkim2.mandrillapp.com`)
  }

  // --- CustomerIO / SendGrid ---
  let sg1 = txtRecords.some(r=>r.includes("sg1"))
  let sg12 = txtRecords.some(r=>r.includes("sg12"))
  if(sg1 && sg12){
    resultsHTML += `<div class="box">CustomerIO/SendGrid: <span class="pass">PASS</span></div>`
  } else {
    resultsHTML += `<div class="box">CustomerIO/SendGrid: <span class="fail">FAIL</span></div>`
    nonCopyable.push(`CustomerIO / SendGrid:
DNS records missing.
Generate from SendGrid or contact MyCRM Technology Support.`)
  }

  document.getElementById("results").innerHTML = resultsHTML

  // Show copyable instructions
  const copyableBox = document.getElementById("instructions-copyable")
  if(copyable.length > 0){
    copyableBox.style.display = "block"
    document.getElementById("copyableInstructions").innerText = copyable.join("\n\n")
  } else {
    copyableBox.style.display = "none"
  }

  // Show non-copyable instructions
  const nonCopyBox = document.getElementById("instructions-noncopyable")
  if(nonCopyable.length > 0){
    nonCopyBox.style.display = "block"
    document.getElementById("nonCopyableInstructions").innerText = nonCopyable.join("\n\n")
  } else {
    nonCopyBox.style.display = "none"
  }
}

function copyInstructions(){
  const text = document.getElementById("copyableInstructions").innerText
  navigator.clipboard.writeText(text)
  alert("All copyable instructions copied!")
}
</script>
</body>
</html>
