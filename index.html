<!DOCTYPE html>
<html>
<head>
<title>DNS Checker Tool</title>
<style>
body{
  font-family: Arial;
  margin:40px;
}

.pass{
  color:green;
  font-weight:bold;
}

.fail{
  color:red;
  font-weight:bold;
}

.box{
  border:1px solid #ccc;
  padding:15px;
  margin-top:15px;
  border-radius:6px;
}

.copy{
  cursor:pointer;
  padding:5px 10px;
  margin-top:5px;
}

.instructions{
  border:1px solid #0073e6;
  background:#f0f8ff;
  padding:15px;
  margin-top:30px;
  border-radius:6px;
}

.instructions h3{
  margin-top:0;
}

pre{
  background:#eee;
  padding:10px;
  border-radius:4px;
}
</style>
</head>

<body>
<h2>DNS Checker Tool</h2>

<input id="domain" placeholder="Enter domain">
<button onclick="checkDNS()">Check DNS</button>

<div id="results"></div>

<div id="instructions" class="instructions" style="display:none;"></div>

<script>
const expected = {
  spf: "v=spf1 include:spf.mandrillapp.com ?all",
  mandrill: "mandrill_verify.",
  dmarc: "v=DMARC1",
  dkim: "_domainkey"
}

function copy(text){
  navigator.clipboard.writeText(text)
  alert("Copied!")
}

async function checkDNS(){
  const domain = document.getElementById("domain").value
  const res = await fetch("https://dns.google/resolve?name=" + domain + "&type=TXT")
  const data = await res.json()
  let txtRecords = []
  if(data.Answer){
    data.Answer.forEach(r=>{
      txtRecords.push(r.data.replace(/"/g,""))
    })
  }

  let resultsHTML = ""
  function check(name,match,correct){
    let pass = txtRecords.some(r=>r.includes(match))
    if(pass){
      resultsHTML += `
      <div class="box">
      ${name}: <span class="pass">PASS</span>
      </div>
      `
    }else{
      resultsHTML += `
      <div class="box">
      ${name}: <span class="fail">FAIL</span>
      <div>
      Correct record:
      <pre>${correct}</pre>
      <button class="copy" onclick="copy('${correct}')">Copy</button>
      </div>
      </div>
      `
    }
  }

  check("SPF","spf1",expected.spf)
  check("Mandrill Verify","mandrill_verify",expected.mandrill)
  check("DMARC","DMARC1",expected.dmarc)
  check("DKIM","domainkey",expected.dkim)

  document.getElementById("results").innerHTML = resultsHTML

  // Show instructions dynamically
  document.getElementById("instructions").style.display = "block"
  document.getElementById("instructions").innerHTML = `
    <h3>Instructions for DNS Records</h3>
    <ol>
      <li>
        <strong>SPF TXT Record</strong><br>
        Please include the following to your current SPF record:<br>
        <pre>include:sendgrid.net include:spf.mandrillapp.com</pre>
        <strong>NOTE:</strong> Please add to your existing SPF record (!DO NOT create a new SPF!)<br>
        Or if you don’t have a current SPF record, create one with:<br>
        <pre>v=spf1 include:sendgrid.net include:spf.mandrillapp.com ~all</pre>
      </li>
      <li>
        <strong>Mandrill Verification Record</strong><br>
        Create a TXT record in your domain's DNS records with the following value:<br>
        <pre>mandrill_verify.${domain}</pre>
      </li>
      <li>
        <strong>DMARC Record</strong><br>
        Create a TXT record in your DNS with the following value:<br>
        <pre>v=DMARC1; p=none;</pre>
      </li>
      <li>
        <strong>DKIM Records</strong><br>
        Create two CNAME records:<br>
        DKIM1: <pre>mte1._domainkey.${domain} -> dkim1.mandrillapp.com</pre>
        DKIM2: <pre>mte2._domainkey.${domain} -> dkim2.mandrillapp.com</pre>
      </li>
      <li>
        <strong>CustomerIO and Mandrill CNAME Records</strong><br>
        <pre>mandrill.${domain} -> mandrillapp.com</pre>
        <pre>email.${domain} -> e.customeriomail.com</pre>
      </li>
    </ol>
  `
}
</script>

</body>
</html>
