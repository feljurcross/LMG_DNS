<!DOCTYPE html>
<html>
<head>
<title>DNS Checker Tool</title>
<style>
body{
  font-family: Arial;
  margin:40px;
}

.pass{
  color:green;
  font-weight:bold;
}

.fail{
  color:red;
  font-weight:bold;
}

.box{
  border:1px solid #ccc;
  padding:15px;
  margin-top:15px;
  border-radius:6px;
}

.copy{
  cursor:pointer;
  padding:5px 10px;
  margin-top:5px;
  background:#0073e6;
  color:#fff;
  border:none;
  border-radius:4px;
}

.instructions{
  border:1px solid;
  background:#f0f8ff;
  padding:15px;
  margin-top:30px;
  border-radius:6px;
}

.instructions h3{
  margin-top:0;
}

pre{
  background:#eee;
  padding:10px;
  border-radius:4px;
  white-space: pre-wrap;
}
</style>
</head>

<body>
## DNS Checker Tool

<div style="display:flex; justify-content:center; align-items:center; gap:8px; margin-bottom:20px;">
  <input id="domain" placeholder="Enter domain" style="width:300px; padding:8px;">
  <button onclick="checkDNS()" style="padding:8px 12px;">Check DNS</button>
</div>

<div id="results"></div>

<div style="margin-top:40px; font-size:14px; color:#555; text-align:center;">
  Powered by MyCRM Technology Support
</div>

<div id="instructions-copyable" class="instructions" style="display:none;">
  ### DNS Records Instructions (Copy & Apply)
  <pre id="copyableInstructions"></pre>
  <button class="copy" onclick="copyInstructions()">Copy All Instructions</button>
</div>

<div id="instructions-noncopyable" class="instructions" style="display:none;">
  ### Instructions (Requires MyCRM Technology Support)
  <pre id="nonCopyableInstructions"></pre>
</div>

<script>
async function fetchDNS(name, type){
  const url = `https://cloudflare-dns.com/dns-query?name=${name}&type=${type}`;
  const res = await fetch(url, { headers: { 'Accept': 'application/dns-json' } });
  const data = await res.json();
  return data.Answer?.map(r => r.data.replace(/"/g,'') ) || [];
}

async function checkDNS(){
  const domain = document.getElementById("domain").value.trim();
  if(!domain) return alert("Please enter a domain");

  let resultsHTML = "";
  const copyable = [];
  const nonCopyable = [];

  try{
    // --- TXT Records (SPF + Mandrill) ---
    const txtRecords = await fetchDNS(domain, "TXT");

    // SPF - checks for both required includes
    const spfPass = txtRecords.some(r =>
      r.includes("include:sendgrid.net") && r.includes("include:spf.mandrillapp.com")
    );
    resultsHTML += `<div class="box">SPF: <span class="${spfPass?'pass':'fail'}">${spfPass?'PASS':'FAIL'}</span></div>`;
    if(!spfPass){
      copyable.push(`SPF TXT Record:
Please include in your SPF:
v=spf1 include:sendgrid.net include:spf.mandrillapp.com ~all
(Note: Add to existing SPF, do NOT create new if exists)`);
    }

    // Mandrill - checks root @ only, must start with mandrill_verify, no trailing space
    const mandrillRecords = txtRecords.filter(r => r.startsWith("mandrill_verify"));
    if(mandrillRecords.length > 0){
      const spacingIssue = mandrillRecords.some(r => r !== r.trim());
      if(spacingIssue){
        resultsHTML += `<div class="box">Mandrill Verify: <span class="fail">INVALID (Extra Spaces)</span><br>
          <small>Raw value: `${mandrillRecords.join(', ')}`</small></div>`;
        nonCopyable.push(`Mandrill TXT Record has extra spaces:
Raw value: "${mandrillRecords.join(', ')}"
Please remove leading/trailing spaces.`);
      } else {
        resultsHTML += `<div class="box">Mandrill Verify: <span class="pass">PASS</span><br>
          <small>Raw value: `${mandrillRecords.join(', ')}`</small></div>`;
      }
    } else {
      resultsHTML += `<div class="box">Mandrill Verify: <span class="fail">FAIL</span><br>
        <small>No mandrill_verify TXT record found on root domain.</small></div>`;
      nonCopyable.push(`No Mandrill TXT record found. Contact MyCRM Technology Support.`);
    }

    // CustomerIO / SendGrid
    const cioRecords = await fetchDNS(`customerio.${domain}`, "CNAME");
    const sg1Records = await fetchDNS(`sg1._domainkey.${domain}`, "CNAME");
    const sg12Records = await fetchDNS(`sg12._domainkey.${domain}`, "CNAME");

    const normalize = arr => arr.map(r => r.replace(/\.$/,'').toLowerCase().trim());
    const expectedCIO = `customerio.${domain}`.toLowerCase();
    const expectedSG1 = `sg1._domainkey.${domain}`.toLowerCase();
    const expectedSG12 = `sg12._domainkey.${domain}`.toLowerCase();

    const cioPass = normalize(cioRecords).includes(expectedCIO);
    const sg1Pass = normalize(sg1Records).includes(expectedSG1);
    const sg12Pass = normalize(sg12Records).includes(expectedSG12);
    const allCioPass = cioPass && sg1Pass && sg12Pass;

    resultsHTML += `<div class="box">CustomerIO/SendGrid: <span class="${allCioPass?'pass':'fail'}">${allCioPass?'PASS':'FAIL'}</span></div>`;
    if(!allCioPass){
      nonCopyable.push(`CustomerIO / SendGrid Missing/Incorrect:
customerio: ${cioRecords.join(', ')}
sg1._domainkey: ${sg1Records.join(', ')}
sg12._domainkey: ${sg12Records.join(', ')}`);
    }

    // DMARC - UPDATED: must have v=DMARC1 and p=quarantine
    const dmarcRecords = await fetchDNS(`_dmarc.${domain}`,"TXT");
    const dmarcPass = dmarcRecords.some(r =>
      r.includes("v=DMARC1") && r.includes("p=quarantine")
    );
    resultsHTML += `<div class="box">DMARC: <span class="${dmarcPass?'pass':'fail'}">${dmarcPass?'PASS':'FAIL'}</span><br>
      <small>Expected host: `_dmarc.${domain}`</small><br>
      <small>Raw value: `${dmarcRecords.join(', ') || 'No record found'}`</small></div>`;
    if(!dmarcPass){
      copyable.push(`DMARC TXT Record:
Host: _dmarc.${domain}
Value: v=DMARC1; p=quarantine;`);
    }

    // DKIM - UPDATED: checks CNAME values point to correct mandrillapp hosts
    const dkim1Records = await fetchDNS(`mte1._domainkey.${domain}`, "CNAME");
    const dkim2Records = await fetchDNS(`mte2._domainkey.${domain}`, "CNAME");

    const normalizeSingle = arr => arr.map(r => r.replace(/\.$/,'').toLowerCase().trim());
    const dkim1Pass = normalizeSingle(dkim1Records).includes("dkim1.mandrillapp.com");
    const dkim2Pass = normalizeSingle(dkim2Records).includes("dkim2.mandrillapp.com");
    const dkimPass = dkim1Pass && dkim2Pass;

    resultsHTML += `<div class="box">DKIM: <span class="${dkimPass?'pass':'fail'}">${dkimPass?'PASS':'FAIL'}</span><br>
      <small>mte1._domainkey.${domain} → `${dkim1Records.join(', ') || 'No record found'}`</small><br>
      <small>mte2._domainkey.${domain} → `${dkim2Records.join(', ') || 'No record found'}`</small></div>`;
    if(!dkimPass){
      copyable.push(`DKIM CNAME Records:
mte1._domainkey.${domain} -> dkim1.mandrillapp.com
mte2._domainkey.${domain} -> dkim2.mandrillapp.com`);
    }

  } catch(e){
    resultsHTML += `<div class="box">ERROR: Could not check DNS. Try again later.</div>`;
  }

  document.getElementById("results").innerHTML = resultsHTML;
  document.getElementById("copyableInstructions").innerText = copyable.join("\n\n");
  document.getElementById("instructions-copyable").style.display = copyable.length>0 ? "block" : "none";
  document.getElementById("nonCopyableInstructions").innerText = nonCopyable.join("\n\n");
  document.getElementById("instructions-noncopyable").style.display = nonCopyable.length>0 ? "block" : "none";
}

function copyInstructions(){
  const text = document.getElementById("copyableInstructions").innerText;
  navigator.clipboard.writeText(text);
  alert("All copyable instructions copied!");
}
</script>
</body>
</html>
