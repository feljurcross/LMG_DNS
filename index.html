<!DOCTYPE html>
<html>
<head>
<title>DNS Checker Tool</title>
<style>
body {
font-family: Arial;
margin: 40px;
}
.pass {
color: green;
font-weight: bold;
}
.fail {
color: red;
font-weight: bold;
}
.box {
border: 1px solid #ccc;
padding: 15px;
margin-top: 15px;
border-radius: 6px;
text-align: left;
}
.copy {
cursor: pointer;
padding: 5px 10px;
margin-top: 5px;
background: ;
color: #fff;
border: none;
border-radius: 4px;
}
.instructions {
border: 1px solid #ccc;
background: ;
padding: 15px;
margin-top: 30px;
border-radius: 6px;
}
.instructions h3 {
margin-top: 0;
}
pre {
background: #eee;
padding: 10px;
border-radius: 4px;
white-space: pre-wrap;
}
.container {
max-width: 800px;
margin: 0 auto;
}
</style>
</head>
<body>
<div class="container">
<p style="text-align:center; font-size:24px; font-weight:bold;">DNS Checker Tool</p>
<div style="display:flex; justify-content:center; align-items:center; gap:8px; margin-bottom:20px;">
<input id="domain" placeholder="Enter domain" style="width:300px; padding:8px;">
<button onclick="checkDNS()" style="padding:8px 12px;">Check DNS</button>
</div>
<div id="results"></div>
<div style="margin-top:40px; font-size:14px; color:#555; text-align:center;">
Powered by MyCRM Technology Support
</div>
<div id="instructions-copyable" class="instructions" style="display:none;">
<p style="font-size:16px; font-weight:bold; margin-top:0;">DNS Records Instructions (Copy & Apply)</p>
<pre id="copyableInstructions"></pre>
<button class="copy" onclick="copyInstructions()">Copy All Instructions</button>
</div>
<div id="instructions-noncopyable" class="instructions" style="display:none;">
<p style="font-size:16px; font-weight:bold; margin-top:0;">Next Steps: (Requires access to Mandrill/SendGrid or assistance from MyCRM Technology Support)</p>
<pre id="nonCopyableInstructions"></pre>
</div>
</div>
<script>
async function fetchDNS(name, type){
const url = "https://cloudflare-dns.com/dns-query?name=" + name + "&type=" + type;
const res = await fetch(url, { headers: { "Accept": "application/dns-json" } });
const data = await res.json();
return data.Answer ? data.Answer.map(r => r.data.replace(/"/g, "")) : [];
}

async function checkDNS(){
const domain = document.getElementById("domain").value.trim();
if(!domain) return alert("Please enter a domain");
let resultsHTML = "";
const copyable = [];
const nonCopyable = [];

try{
const txtRecords = await fetchDNS(domain, "TXT");

// 1. SPF
const spfRecord = txtRecords.find(r =>
r.includes("include:sendgrid.net") && r.includes("include:spf.mandrillapp.com")
);
const spfPass = !!spfRecord;
const spfRaw = txtRecords.find(r => r.includes("spf1")) || "No SPF record found";
resultsHTML += "<div class='box'>SPF: <span class='" + (spfPass?"pass":"fail") + "'>" + (spfPass?"PASS":"FAIL") + "</span><br><small>Raw value: " + spfRaw + "</small></div>";
if(!spfPass){
copyable.push(
"SPF TXT Record:\n" +
"(Note: Add to existing SPF, do NOT create new if exists)\n\n" +
"Type: TXT\n" +
"Host: @\n" +
"Value: v=spf1 include:sendgrid.net include:spf.mandrillapp.com ~all"
);
}

// 2. Mandrill Verify
const mandrillRecords = txtRecords.filter(r => r.startsWith("mandrill_verify"));
if(mandrillRecords.length > 0){
const spacingIssue = mandrillRecords.some(r => r !== r.trim());
if(spacingIssue){
resultsHTML += "<div class='box'>Mandrill Verify: <span class='fail'>INVALID</span><br><small>Space found in record.</small><br><small>Raw value: " + mandrillRecords.join(", ") + "</small></div>";
nonCopyable.push("Mandrill Verify:\nSpace found in record.\nRaw value: " + mandrillRecords.join(", ") + "\nPlease remove leading/trailing spaces.");
} else {
resultsHTML += "<div class='box'>Mandrill Verify: <span class='pass'>PASS</span><br><small>Raw value: " + mandrillRecords.join(", ") + "</small></div>";
}
} else {
resultsHTML += "<div class='box'>Mandrill Verify: <span class='fail'>FAIL</span><br><small>No TXT record found.</small></div>";
nonCopyable.push("Mandrill Verify:\nNo TXT record found.\nPlease log in to Mandrill to retrieve the verification TXT record for this domain.");
}

// 3. DMARC
const dmarcRecords = await fetchDNS("_dmarc." + domain, "TXT");
const dmarcPass = dmarcRecords.some(r =>
r.includes("v=DMARC1") && (r.includes("p=none") || r.includes("p=quarantine"))
);
resultsHTML += "<div class='box'>DMARC: <span class='" + (dmarcPass?"pass":"fail") + "'>" + (dmarcPass?"PASS":"FAIL") + "</span><br><small>Expected host: _dmarc." + domain + "</small><br><small>Raw value: " + (dmarcRecords.join(", ") || "No record found") + "</small></div>";
if(!dmarcPass){
copyable.push(
"DMARC TXT Record:\n\n" +
"Type: TXT\n" +
"Host: _dmarc." + domain + "\n" +
"Value: v=DMARC1; p=none;"
);
}

// 4. DKIM
const dkim1Records = await fetchDNS("mte1._domainkey." + domain, "CNAME");
const dkim2Records = await fetchDNS("mte2._domainkey." + domain, "CNAME");
const normalizeSingle = arr => arr.map(r => r.replace(/\.$/, "").toLowerCase().trim());
const dkim1Pass = normalizeSingle(dkim1Records).includes("dkim1.mandrillapp.com");
const dkim2Pass = normalizeSingle(dkim2Records).includes("dkim2.mandrillapp.com");
const dkimPass = dkim1Pass && dkim2Pass;
resultsHTML += "<div class='box'>DKIM: <span class='" + (dkimPass?"pass":"fail") + "'>" + (dkimPass?"PASS":"FAIL") + "</span><br><small>mte1._domainkey." + domain + " -> " + (dkim1Records.join(", ") || "No record found") + "</small><br><small>mte2._domainkey." + domain + " -> " + (dkim2Records.join(", ") || "No record found") + "</small></div>";
if(!dkimPass){
let dkimInstructions = "DKIM CNAME Records:\n";
if(!dkim1Pass){
dkimInstructions +=
"\nType: CNAME\n" +
"Host: mte1._domainkey." + domain + "\n" +
"Value: dkim1.mandrillapp.com";
}
if(!dkim2Pass){
dkimInstructions +=
"\n\nType: CNAME\n" +
"Host: mte2._domainkey." + domain + "\n" +
"Value: dkim2.mandrillapp.com";
}
copyable.push(dkimInstructions.trim());
}

// 5. CustomerIO/SendGrid
const cioRecords = await fetchDNS("customerio." + domain, "CNAME");
const sg1Records = await fetchDNS("sg1._domainkey." + domain, "CNAME");
const sg12Records = await fetchDNS("sg12._domainkey." + domain, "CNAME");
const hasDuplicateCio = cioRecords.length !== new Set(cioRecords).size;
const hasDuplicateSg1 = sg1Records.length !== new Set(sg1Records).size;
const hasDuplicateSg12 = sg12Records.length !== new Set(sg12Records).size;
const hasSpaceCio = cioRecords.some(r => r !== r.trim());
const hasSpaceSg1 = sg1Records.some(r => r !== r.trim());
const hasSpaceSg12 = sg12Records.some(r => r !== r.trim());
const cioPass = cioRecords.length > 0 && !hasDuplicateCio && !hasSpaceCio;
const sg1Pass = sg1Records.length > 0 && !hasDuplicateSg1 && !hasSpaceSg1;
const sg12Pass = sg12Records.length > 0 && !hasDuplicateSg12 && !hasSpaceSg12;
const allCioPass = cioPass && sg1Pass && sg12Pass;
resultsHTML += "<div class='box'>CustomerIO/SendGrid: <span class='" + (allCioPass?"pass":"fail") + "'>" + (allCioPass?"PASS":"FAIL") + "</span><br><small>customerio." + domain + " -> " + (cioRecords.join(", ") || "No record found") + "</small><br><small>sg1._domainkey." + domain + " -> " + (sg1Records.join(", ") || "No record found") + "</small><br><small>sg12._domainkey." + domain + " -> " + (sg12Records.join(", ") || "No record found") + "</small></div>";
if(!allCioPass){
let cioIssue = "";
if(cioRecords.length === 0) cioIssue = "No CNAME record found.";
else if(hasDuplicateCio) cioIssue = "Duplicate records found.";
else if(hasSpaceCio) cioIssue = "Space found in record.";
let sg1Issue = "";
if(sg1Records.length === 0) sg1Issue = "No CNAME record found.";
else if(hasDuplicateSg1) sg1Issue = "Duplicate records found.";
else if(hasSpaceSg1) sg1Issue = "Space found in record.";
let sg12Issue = "";
if(sg12Records.length === 0) sg12Issue = "No CNAME record found.";
else if(hasDuplicateSg12) sg12Issue = "Duplicate records found.";
else if(hasSpaceSg12) sg12Issue = "Space found in record.";

let msg = "CustomerIO / SendGrid CNAME Records:\n";
if(cioRecords.length === 0){
msg +=
"\nType: CNAME\n" +
"Host: customerio." + domain + "\n" +
"Value: u11692406.wl157.sendgrid.net";
} else if(cioIssue){
msg += "\ncustomerio." + domain + ": " + cioIssue;
}
if(sg1Records.length === 0){
msg +=
"\n\nType: CNAME\n" +
"Host: sg1._domainkey." + domain + "\n" +
"Value: sg1.domainkey.u11692406.wl157.sendgrid.net";
} else if(sg1Issue){
msg += "\nsg1._domainkey." + domain + ": " + sg1Issue;
}
if(sg12Records.length === 0){
msg +=
"\n\nType: CNAME\n" +
"Host: sg12._domainkey." + domain + "\n" +
"Value: sg12.domainkey.u11692406.wl157.sendgrid.net";
} else if(sg12Issue){
msg += "\nsg12._domainkey." + domain + ": " + sg12Issue;
}
nonCopyable.push(msg.trim());
}

} catch(e){
resultsHTML += "<div class='box'>ERROR: Could not check DNS. Try again later.</div>";
}

document.getElementById("results").innerHTML = resultsHTML;
document.getElementById("copyableInstructions").innerText = copyable.join("\n\n");
document.getElementById("instructions-copyable").style.display = copyable.length > 0 ? "block" : "none";
document.getElementById("nonCopyableInstructions").innerText = nonCopyable.join("\n\n");
document.getElementById("instructions-noncopyable").style.display = nonCopyable.length > 0 ? "block" : "none";
}

function copyInstructions(){
const text = document.getElementById("copyableInstructions").innerText;
navigator.clipboard.writeText(text);
alert("All copyable instructions copied!");
}
</script>
</body>
</html>
