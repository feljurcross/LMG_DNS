<!DOCTYPE html>
<html>
<head>
<title>DNS Checker Tool</title>
<style>
body{
  font-family: Arial;
  margin:40px;
}

.pass{
  color:green;
  font-weight:bold;
}

.fail{
  color:red;
  font-weight:bold;
}

.box{
  border:1px solid #ccc;
  padding:15px;
  margin-top:15px;
  border-radius:6px;
}

.copy{
  cursor:pointer;
  padding:5px 10px;
  margin-top:5px;
  background:#0073e6;
  color:#fff;
  border:none;
  border-radius:4px;
}

.instructions{
  border:1px solid #0073e6;
  background:#f0f8ff;
  padding:15px;
  margin-top:30px;
  border-radius:6px;
}

.instructions h3{
  margin-top:0;
}

pre{
  background:#eee;
  padding:10px;
  border-radius:4px;
  white-space: pre-wrap;
}
</style>
</head>

<body>
<h2 style="text-align:center;">DNS Checker Tool</h2>

<div style="text-align:center; margin-bottom:20px;">
  <input id="domain" placeholder="Enter domain" style="width:300px; padding:8px;">
  <button onclick="checkDNS()" style="padding:8px 12px;">Check DNS</button>
</div>

<div id="results"></div>

<div style="margin-top:40px; font-size:14px; color:#555; text-align:center;">
  Powered by MyCRM Technology Support
</div>

<div id="instructions-copyable" class="instructions" style="display:none;">
  <h3>DNS Records Instructions (Copy & Apply)</h3>
  <pre id="copyableInstructions"></pre>
  <button class="copy" onclick="copyInstructions()">Copy All Instructions</button>
</div>

<div id="instructions-noncopyable" class="instructions" style="display:none;">
  <h3>Instructions (Requires MyCRM Technology Support)</h3>
  <pre id="nonCopyableInstructions"></pre>
</div>

<script>
async function fetchDNS(name, type){
  const url = `https://cloudflare-dns.com/dns-query?name=${name}&type=${type}`;
  const res = await fetch(url, { headers: { 'Accept': 'application/dns-json' } });
  const data = await res.json();
  return data.Answer?.map(r => r.data.replace(/"/g,'')) || [];
}

async function checkDNS(){
  const domain = document.getElementById("domain").value.trim();
  if(!domain) return alert("Please enter a domain");

  let resultsHTML = "";
  const copyable = [];
  const nonCopyable = [];

  try{
    // --- TXT Records (SPF + Mandrill) ---
    const txtRecords = await fetchDNS(domain, "TXT");

    // SPF
    const spfPass = txtRecords.some(r => r.includes("spf1"));
    resultsHTML += `<div class="box">SPF: <span class="${spfPass ? 'pass':'fail'}">${spfPass ? 'PASS':'FAIL'}</span></div>`;
    if(!spfPass){
      copyable.push(`SPF TXT Record:
Please include the following to your current SPF record:
include:sendgrid.net include:spf.mandrillapp.com
NOTE: Do NOT create a new SPF if one exists!
Or create:
v=spf1 include:sendgrid.net include:spf.mandrillapp.com ~all`);
    }

    // Mandrill
    const mandrillRecords = txtRecords.filter(r => r.includes("mandrill_verify"));
    if(mandrillRecords.length > 0){
      const spacingIssue = mandrillRecords.some(r => r !== r.trim());
      if(spacingIssue){
        resultsHTML += `<div class="box">Mandrill Verify: <span class="fail">INVALID (Spaces)</span></div>`;
        copyable.push(`Mandrill TXT Record Fix:
Remove leading/trailing spaces.
Example:
mandrill_verify.xxxxxxxx`);
      } else {
        resultsHTML += `<div class="box">Mandrill Verify: <span class="pass">PASS</span></div>`;
      }
    } else {
      resultsHTML += `<div class="box">Mandrill Verify: <span class="fail">FAIL</span></div>`;
      nonCopyable.push(`Mandrill Verification:
No Mandrill TXT record found.
Generate from Mailchimp Mandrill or contact MyCRM Technology Support.`);
    }

    // DMARC
    const dmarcRecords = await fetchDNS(`_dmarc.${domain}`, "TXT");
    const dmarcPass = dmarcRecords.some(r => r.includes("DMARC1"));
    resultsHTML += `<div class="box">DMARC: <span class="${dmarcPass?'pass':'fail'}">${dmarcPass?'PASS':'FAIL'}</span></div>`;
    if(!dmarcPass){
      copyable.push(`DMARC TXT Record:
Host: _dmarc
Value: v=DMARC1; p=none;`);
    }

    // DKIM
    const dkim1 = (await fetchDNS(`mte1._domainkey.${domain}`,"CNAME")).length > 0;
    const dkim2 = (await fetchDNS(`mte2._domainkey.${domain}`,"CNAME")).length > 0;
    const dkimPass = dkim1 && dkim2;
    resultsHTML += `<div class="box">DKIM: <span class="${dkimPass?'pass':'fail'}">${dkimPass?'PASS':'FAIL'}</span></div>`;
    if(!dkimPass){
      copyable.push(`DKIM CNAME Records:
CNAME1: mte1._domainkey.${domain} -> dkim1.mandrillapp.com
CNAME2: mte2._domainkey.${domain} -> dkim2.mandrillapp.com`);
    }

    // CustomerIO / SendGrid
    const cio = (await fetchDNS(`customerio.${domain}`,"CNAME")).some(r => r.includes("customerio"));
    const sg1 = (await fetchDNS(`sg1._domainkey.${domain}`,"CNAME")).some(r => r.includes("sg1"));
    const sg12 = (await fetchDNS(`sg12._domainkey.${domain}`,"CNAME")).some(r => r.includes("sg12"));
    const cioPass = cio && sg1 && sg12;
    resultsHTML += `<div class="box">CustomerIO/SendGrid: <span class="${cioPass?'pass':'fail'}">${cioPass?'PASS':'FAIL'}</span></div>`;
    if(!cioPass){
      nonCopyable.push(`CustomerIO / SendGrid:
Missing required DNS records:
- customerio CNAME
- sg1 DKIM
- sg12 DKIM
Generate from SendGrid or contact MyCRM Technology Support.`);
    }

  } catch(e){
    resultsHTML += `<div class="box">ERROR: Could not check DNS. Try again later.</div>`;
  }

  document.getElementById("results").innerHTML = resultsHTML;
  document.getElementById("copyableInstructions").innerText = copyable.join("\n\n");
  document.getElementById("instructions-copyable").style.display = copyable.length>0 ? "block":"none";
  document.getElementById("nonCopyableInstructions").innerText = nonCopyable.join("\n\n");
  document.getElementById("instructions-noncopyable").style.display = nonCopyable.length>0 ? "block":"none";
}

function copyInstructions(){
  const text = document.getElementById("copyableInstructions").innerText;
  navigator.clipboard.writeText(text);
  alert("All copyable instructions copied!");
}
</script>
</body>
</html>
